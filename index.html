<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온보딩 사전문의</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app" class="app">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p>불러오는 중입니다...</p>
    </div>
  </div>

  <div id="summaryModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-head">
        <h3>입력 내용 확인</h3>
        <button id="closeSummaryBtn" class="icon-btn" type="button" aria-label="닫기">✕</button>
      </div>
      <div id="summaryContent" class="summary-content"></div>
      <div class="modal-actions">
        <button id="editBtn" class="btn btn-light" type="button">수정하기</button>
        <button id="confirmSubmitBtn" class="btn btn-primary" type="button">제출하기</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden" aria-live="polite"></div>

  <script src="./app.js"></script>
</body>
</html>
