<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>온보딩 가이드</title>

  <style>
    :root{
      --bg:#F6F7FB;
      --card:#FFFFFF;
      --text:#111827;
      --muted:#6B7280;
      --line:#E5E7EB;
      --poomgo:#0040D1;
      --poomgo-weak:rgba(0,64,209,.08);
      --ok:#16A34A;
      --ok-weak:#ECFDF5;
      --ok-border:#BBF7D0;
      --shadow:0 10px 28px rgba(17,24,39,.08);
      --radius:20px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Pretendard, system-ui, -apple-system, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:24px 18px 40px;
    }

    .top{
      margin-bottom:16px;
    }

    .title{
      margin:0;
      font-size:28px;
      font-weight:900;
    }

    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      line-height:1.6;
    }

    .progressInline{
      margin-top:14px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    .progressHead{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .progressTitle{
      margin:0;
      font-size:15px;
      font-weight:900;
    }

    .progressMeta{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
    }

    .bar{
      width:100%;
      height:12px;
      border-radius:999px;
      background:#E5E7EB;
      overflow:hidden;
    }

    .barFill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, #0040D1, #2F6BFF);
      transition:width .25s ease;
    }

    .layout{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:16px;
      align-items:start;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .sidebar{
      padding:16px;
      position:sticky;
      top:16px;
    }

    .sidebarTitle{
      margin:0 0 12px;
      font-size:16px;
      font-weight:900;
    }

    .stepNav{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .stepNavItem{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }

    .stepNavItem.done{
      background:var(--ok-weak);
      border-color:var(--ok-border);
    }

    .stepNavItem.current{
      border-color:#BBD0FF;
      background:#F8FBFF;
    }

    .stepNavTop{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
    }

    .stepNavLabel{
      font-size:13px;
      font-weight:900;
      line-height:1.5;
    }

    .navBtn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:10px;
      padding:6px 10px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
    }

    .main{
      padding:18px;
      min-height:500px;
    }

    .stageCard{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
    }

    .stageHead{
      padding:18px 18px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:78px;
      height:30px;
      padding:0 12px;
      border-radius:999px;
      background:var(--poomgo-weak);
      color:var(--poomgo);
      font-size:12px;
      font-weight:900;
      margin-bottom:8px;
    }

    .stageTitle{
      margin:0;
      font-size:22px;
      font-weight:900;
      line-height:1.35;
    }

    .doneBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:40px;
      padding:0 16px;
      border:none;
      border-radius:12px;
      background:var(--ok);
      color:#fff;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
    }

    .blocks{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .block{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .blockHead{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:#FAFAFB;
    }

    .blockTitle{
      margin:0;
      font-size:15px;
      font-weight:900;
      line-height:1.45;
    }

.path{
  margin-top:8px;
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:12px 14px;
  background:var(--poomgo-weak);
  border-left:5px solid var(--poomgo);
}

.pathBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:52px;
  height:30px;
  padding:0 10px;
  border-radius:10px;
  background:#fff;
  border:1px solid rgba(0,64,209,.18);
  color:var(--poomgo);
  font-size:12px;
  font-weight:900;
  flex:0 0 auto;
  margin-top:2px;
}

    .pathText{
      color:#1F2937;
      font-size:14px;
      font-weight:800;
      line-height:1.55;
      word-break:break-word;
    }

    .pathText a,
    .desc a,
    .highlight a,
    .checklist a {
      color: var(--poomgo);
      font-weight: 900;
      text-decoration: underline;
      word-break: break-all;
    }

    .desc{
      padding:14px;
      font-size:14px;
      font-weight:800;
      color:#1F2937;
      line-height:1.7;
      white-space:normal;
    }

    .highlight{
      margin:0 14px 14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid #FECACA;
      background:#FEF2F2;
      color:#991B1B;
      font-size:13px;
      font-weight:900;
      line-height:1.55;
    }

    .imgWrap{
      padding:14px;
    }

    .imgWrap img{
      width:100%;
      display:block;
      border-radius:14px;
      border:1px solid var(--line);
      cursor:zoom-in;
    }

    .imgHint{
      margin:8px 0 0;
      text-align:right;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .buttonArea{
      padding:0 14px 14px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .linkBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:38px;
      padding:0 14px;
      border-radius:12px;
      background:var(--poomgo);
      color:#fff;
      font-size:13px;
      font-weight:900;
      text-decoration:none;
    }

    .checklist{
      padding:14px;
    }

    .checklist ul{
      margin:0;
      padding-left:20px;
    }

    .checklist li{
      margin-bottom:8px;
      color:#1F2937;
      font-size:14px;
      font-weight:800;
      line-height:1.6;
    }

    .empty{
      padding:40px 20px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .finalMsg{
      margin-top:14px;
      padding:18px;
      border:1px solid var(--ok-border);
      background:var(--ok-weak);
      border-radius:16px;
      display:none;
    }

    .finalMsg p{
      margin:0;
      color:#166534;
      font-size:15px;
      font-weight:900;
      line-height:1.6;
    }

    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.6);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }

    .modal{
      width:min(1280px, 98vw);
      max-height:94vh;
      overflow:auto;
      background:#fff;
      border-radius:22px;
    }

    .modalHead{
      position:sticky;
      top:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      background:#fff;
      border-bottom:1px solid var(--line);
    }

    .modalTitle{
      margin:0;
      font-size:14px;
      font-weight:900;
    }

    .modalBody{
      padding:16px;
    }

    .zoomImg{
      width:100%;
      display:block;
      border-radius:16px;
      border:1px solid var(--line);
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }
      .sidebar{
        position:static;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 class="title" id="pageTitle">온보딩 가이드</h1>
      <p class="sub" id="pageSubtitle">데이터를 불러오는 중입니다.</p>

      <div class="progressInline">
        <div class="progressHead">
          <p class="progressTitle">진행률</p>
          <div class="progressMeta" id="progressMeta">0 / 0 단계 완료</div>
        </div>
        <div class="bar"><div class="barFill" id="barFill"></div></div>
      </div>
    </div>

    <div class="layout">
      <aside class="card sidebar">
        <p class="sidebarTitle" id="clientNameBox">고객사 확인 중</p>
        <div class="stepNav" id="stepNav"></div>
      </aside>

      <main class="card main">
        <div id="currentStageArea"></div>

        <div class="finalMsg" id="finalMsg">
          <p>✅ 모든 온보딩 단계를 완료했습니다. 담당자에게 완료 여부를 공유해주세요.</p>
        </div>
      </main>
    </div>
  </div>

  <div class="modalBack" id="zoomBack">
    <div class="modal">
      <div class="modalHead">
        <p class="modalTitle" id="zoomTitle">이미지 확대</p>
        <button class="navBtn" id="zoomClose" type="button">닫기</button>
      </div>
      <div class="modalBody">
        <img class="zoomImg" id="zoomImg" src="" alt="zoom" />
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzJHhyl4gwS6R7MXtWKuFbTMZE0-DOwyGPA73l19dJD_SCF7S2mtyazd_1OmVvAoCJV/exec';

    let payload = null;
    let groupedSteps = [];
    let completedSteps = [];
    let viewingStepNo = null;

    const params = new URLSearchParams(location.search);
    const clientCode = params.get('client') || '';

    function progressKey() {
      return 'onboarding_progress_' + clientCode;
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(progressKey());
        const parsed = raw ? JSON.parse(raw) : [];
        completedSteps = Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        completedSteps = [];
      }
    }

    function saveProgress() {
      localStorage.setItem(progressKey(), JSON.stringify(completedSteps));
    }

    function isCompleted(stepNo) {
      return completedSteps.includes(stepNo);
    }

    function getCurrentStepNo() {
      const next = groupedSteps.find(step => !isCompleted(step.stepNo));
      return next ? next.stepNo : null;
    }

    function getDisplayStepNo() {
      if (viewingStepNo) return viewingStepNo;
      return getCurrentStepNo();
    }

    function loadData() {
      if (!clientCode) {
        showMainEmpty('고객사 코드가 없습니다. URL 뒤에 ?client=고객사코드 형태로 접속해주세요.');
        return;
      }

      window.renderOnboardingData = function(data) {
        payload = data;
        loadProgress();
        buildSteps();
        renderAll();
      };

      const script = document.createElement('script');
      script.src =
        APPS_SCRIPT_WEBAPP_URL +
        '?mode=data&client=' + encodeURIComponent(clientCode) +
        '&callback=renderOnboardingData';
      script.onerror = function() {
        showMainEmpty('가이드 데이터를 불러오지 못했습니다. Apps Script URL과 배포 상태를 확인해주세요.');
      };
      document.body.appendChild(script);
    }

    function buildSteps() {
      const items = (payload && payload.guideItems) ? payload.guideItems : [];
      const map = new Map();

      items.forEach(item => {
        if (!map.has(item.stepNo)) {
          map.set(item.stepNo, {
            stepNo: item.stepNo,
            stepName: item.stepName,
            blocks: []
          });
        }
        map.get(item.stepNo).blocks.push(item);
      });

      groupedSteps = Array.from(map.values()).sort((a, b) => a.stepNo - b.stepNo);
    }

    function renderAll() {
      const client = payload && payload.client ? payload.client : null;

      document.title = client && client.pageTitle ? client.pageTitle : '온보딩 가이드';
      document.getElementById('pageTitle').textContent = client && client.pageTitle ? client.pageTitle : '온보딩 가이드';
      document.getElementById('pageSubtitle').textContent = client && client.subtitle ? client.subtitle : '아래 순서대로 진행해주세요.';
      document.getElementById('clientNameBox').textContent = client && client.clientName ? client.clientName : '고객사';

      renderSidebar();
      renderCurrentStage();
      renderProgress();
      renderFinalMessage();
    }

    function renderSidebar() {
      const nav = document.getElementById('stepNav');

      if (!groupedSteps.length) {
        nav.innerHTML = '<div class="stepNavItem"><div class="stepNavLabel">단계 정보 없음</div></div>';
        return;
      }

      const currentStepNo = getCurrentStepNo();
      const displayStepNo = getDisplayStepNo();

      nav.innerHTML = groupedSteps.map(step => {
        const done = isCompleted(step.stepNo);
        const current = !done && step.stepNo === currentStepNo;
        const viewing = step.stepNo === displayStepNo;

        return `
          <div class="stepNavItem ${done ? 'done' : ''} ${current || viewing ? 'current' : ''}">
            <div class="stepNavTop">
              <div class="stepNavLabel">
                ${done ? '✅' : (current ? '🔵' : '⚪')} STEP${step.stepNo} ${escapeHtml(step.stepName)}
              </div>
              ${done
                ? `<button class="navBtn" type="button" data-view-step="${step.stepNo}">보기</button>`
                : (current
                    ? `<button class="navBtn" type="button" data-view-step="${step.stepNo}">진행중</button>`
                    : '')
              }
            </div>
          </div>
        `;
      }).join('');
    }

    function renderCurrentStage() {
      const area = document.getElementById('currentStageArea');
      const stepNo = getDisplayStepNo();

      if (!stepNo) {
        area.innerHTML = '<div class="empty">현재 표시할 단계가 없습니다.</div>';
        return;
      }

      const step = groupedSteps.find(s => s.stepNo === stepNo);
      if (!step) {
        area.innerHTML = '<div class="empty">단계 정보를 찾을 수 없습니다.</div>';
        return;
      }

      area.innerHTML = `
        <section class="stageCard">
          <div class="stageHead">
            <div>
              <div class="badge">${isCompleted(step.stepNo) ? '완료 STEP ' + step.stepNo : 'STEP ' + step.stepNo}</div>
              <p class="stageTitle">${escapeHtml(step.stepName)}</p>
            </div>
            ${!isCompleted(step.stepNo)
              ? `<button class="doneBtn" type="button" id="completeCurrentStepBtn" data-step="${step.stepNo}">완료</button>`
              : ''
            }
          </div>
          <div class="blocks">
            ${step.blocks.sort((a,b) => a.blockOrder - b.blockOrder).map(renderBlockHtml).join('')}
          </div>
        </section>
      `;
    }

    function renderBlockHtml(block) {
      const type = block.blockType || '';
      const title = block.blockTitle || '';
      const path = block.path || '';
      const desc = block.desc || '';
      const imageThumb = block.imageThumb || '';
      const imageZoom = block.imageZoom || '';
      const buttonText = block.buttonText || '';
      const buttonUrl = block.buttonUrl || '';
      const highlight = block.highlight || '';

      const headHtml = title ? `
        <div class="blockHead">
          <p class="blockTitle">${escapeHtml(title)}</p>
        </div>
      ` : '';

      const pathHtml = path ? `
        <div class="path">
          <span class="pathBadge">경로</span>
          <div class="pathText">${path}</div>
        </div>
      ` : '';

      const descHtml = desc ? `
        <div class="desc">${desc}</div>
      ` : '';

      const highlightHtml = highlight ? `
        <div class="highlight">${highlight}</div>
      ` : '';

      const imageHtml = imageThumb ? `
        <div class="imgWrap">
          <img
            src="${escapeAttr(imageThumb)}"
            data-zoom="${escapeAttr(imageZoom || imageThumb)}"
            data-title="${escapeAttr(title || '이미지')}"
            alt="${escapeAttr(title || '이미지')}"
          />
          <p class="imgHint">이미지를 클릭하면 확대됩니다.</p>
        </div>
      ` : '';

      const buttonHtml = buttonText ? `
        <div class="buttonArea">
          ${buttonUrl
            ? `<a class="linkBtn" href="${escapeAttr(buttonUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(buttonText)}</a>`
            : ''
          }
        </div>
      ` : '';

      const checklistHtml = type === '체크리스트' && desc ? `
        <div class="checklist">
          <ul>
            ${desc
              .split('<br>')
              .map(item => item.trim())
              .filter(Boolean)
              .map(item => `<li>${item}</li>`)
              .join('')}
          </ul>
        </div>
      ` : '';

      return `
        <div class="block">
          ${headHtml}
          ${pathHtml}
          ${type === '체크리스트' ? checklistHtml : descHtml}
          ${highlightHtml}
          ${imageHtml}
          ${buttonHtml}
        </div>
      `;
    }

    function renderProgress() {
      const total = groupedSteps.length;
      const done = completedSteps.filter(stepNo => groupedSteps.some(s => s.stepNo === stepNo)).length;
      const pct = total ? Math.round((done / total) * 100) : 0;

      document.getElementById('progressMeta').textContent = done + ' / ' + total + ' 단계 완료';
      document.getElementById('barFill').style.width = pct + '%';
    }

    function renderFinalMessage() {
      const total = groupedSteps.length;
      const done = completedSteps.filter(stepNo => groupedSteps.some(s => s.stepNo === stepNo)).length;
      document.getElementById('finalMsg').style.display = (total > 0 && done === total) ? 'block' : 'none';
    }

    function completeStep(stepNo) {
      if (!completedSteps.includes(stepNo)) {
        completedSteps.push(stepNo);
        completedSteps.sort((a, b) => a - b);
        saveProgress();
      }

      viewingStepNo = null;
      renderAll();

      const main = document.querySelector('.main');
      if (main) {
        main.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function showMainEmpty(message) {
      document.getElementById('currentStageArea').innerHTML = '<div class="empty">' + escapeHtml(message) + '</div>';
    }

    document.addEventListener('click', function(e) {
      const viewBtn = e.target.closest('[data-view-step]');
      if (viewBtn) {
        viewingStepNo = Number(viewBtn.getAttribute('data-view-step')) || null;
        renderAll();
        return;
      }

      const completeBtn = e.target.closest('#completeCurrentStepBtn');
      if (completeBtn) {
        const stepNo = Number(completeBtn.getAttribute('data-step'));
        if (stepNo) completeStep(stepNo);
        return;
      }

      const img = e.target.closest('img[data-zoom]');
      if (img) {
        openZoom(img.getAttribute('data-zoom'), img.getAttribute('data-title'));
      }
    });

    const zoomBack = document.getElementById('zoomBack');
    const zoomImg = document.getElementById('zoomImg');
    const zoomTitle = document.getElementById('zoomTitle');
    const zoomClose = document.getElementById('zoomClose');

    function openZoom(src, title) {
      if (!src) return;
      zoomImg.src = src;
      zoomTitle.textContent = title || '이미지 확대';
      zoomBack.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      zoomBack.style.display = 'none';
      zoomImg.src = '';
      document.body.style.overflow = '';
    }

    zoomClose.addEventListener('click', closeZoom);
    zoomBack.addEventListener('click', function(e) {
      if (e.target === zoomBack) closeZoom();
    });

    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeZoom();
    });

    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }

    loadData();
  </script>
</body>
</html>
