<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N배송 세팅 가이드</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    :root{
      --panel:#ffffff;
      --line:#d9e1ea;
      --text:#111827;
      --muted:#6b7280;
      --brand:#0040d1;
      --brand-soft:#eef3ff;
      --warn-bg:#fff7ed;
      --warn-line:#fed7aa;
      --warn-text:#9a3412;
      --danger-bg:#fff1f2;
      --danger-line:#fecdd3;
      --danger-text:#be123c;
      --shadow:0 14px 34px rgba(15,23,42,.12);
      --progress-bg:#e5ebf2;
      --progress-fill:#0040d1;
      --card-selected:#eef4ff;
      --card-border:#cddcff;
      --soft:#f8fafc;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:"Pretendard Variable","Pretendard",system-ui,sans-serif;
      background:linear-gradient(180deg,#f3f6fa 0%, #e9eef5 100%);
      color:var(--text);
      overflow:hidden;
    }

    button,input,select,textarea{font:inherit}
    img{max-width:100%;display:block}
    a{text-decoration:none}
    .hidden{display:none !important}

    .app{
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }

    .wizard-window{
      width:min(1140px, 100%);
      height:min(850px, calc(100vh - 24px));
      background:var(--panel);
      border:1px solid #cfd8e4;
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .window-titlebar{
      height:58px;
      background:linear-gradient(180deg,#fbfcfe 0%, #eef3f8 100%);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      flex:0 0 58px;
    }

    .titlebar-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .top-logo{
      height:26px;
      width:auto;
      object-fit:contain;
      flex:0 0 auto;
    }

    .window-title{
      font-size:18px;
      font-weight:900;
      letter-spacing:-.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .window-sub{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-left:12px;
      flex:0 0 auto;
    }

    .window-body{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      justify-content:center;
      background:#fff;
      overflow:hidden;
    }

    .right-pane{
      width:100%;
      max-width:920px;
      margin:0 auto;
      min-width:0;
      min-height:0;
      display:flex;
      flex-direction:column;
      background:#fff;
      overflow:hidden;
    }

    .pane-top{
      padding:22px 28px 0;
      flex:0 0 auto;
    }

    .progress-row{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:12px;
    }

    .progress-left{
      min-width:0;
      flex:1;
    }

    .step-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      background:var(--brand-soft);
      color:var(--brand);
      font-size:13px;
      font-weight:900;
      margin-bottom:8px;
    }

    .pane-title{
      margin:0 0 4px;
      font-size:27px;
      line-height:1.2;
      letter-spacing:-.03em;
      font-weight:900;
      word-break:keep-all;
    }

    .pane-desc{
      margin:0;
      color:var(--muted);
      font-size:14px;
      white-space:pre-line;
      word-break:keep-all;
    }

    .progress-right{
      text-align:right;
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      white-space:pre-line;
      flex:0 0 auto;
    }

    .progress-track{
      width:100%;
      height:12px;
      border-radius:999px;
      background:var(--progress-bg);
      overflow:hidden;
      border:1px solid #dbe3ee;
    }

    .progress-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#0040d1 0%, #2d6cff 100%);
      transition:width .2s ease;
    }

    .pane-content{
      flex:1 1 auto;
      min-height:0;
      padding:16px 28px 14px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .screen-card{
      flex:1 1 auto;
      min-height:0;
      border:1px solid #e8edf3;
      border-radius:22px;
      background:linear-gradient(180deg,#ffffff 0%, #fbfcfe 100%);
      padding:18px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .section-label{
      margin:0 0 8px;
      font-size:12px;
      font-weight:900;
      color:#7b8794;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .hero-box{
      margin-bottom:10px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid #e4ebf8;
      background:linear-gradient(180deg,#fcfdff 0%, #f4f7ff 100%);
      flex:0 0 auto;
    }

    .hero-text{
      margin:0;
      font-size:18px;
      line-height:1.45;
      font-weight:900;
      letter-spacing:-.025em;
      word-break:keep-all;
      white-space:pre-line;
    }

    .screen-body{
      min-height:0;
      flex:1 1 auto;
      overflow-y:auto;
      overflow-x:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-right:4px;
      scrollbar-width:thin;
    }

    .screen-body::-webkit-scrollbar{width:8px}
    .screen-body::-webkit-scrollbar-thumb{
      background:#d6deea;
      border-radius:999px;
    }
    .screen-body::-webkit-scrollbar-track{
      background:transparent;
    }

    .screen-title{
      margin:0;
      font-size:21px;
      line-height:1.3;
      font-weight:900;
      letter-spacing:-.02em;
      word-break:keep-all;
      flex:0 0 auto;
    }

    .detail-body{
      margin:0;
      font-size:15px;
      color:#374151;
      word-break:break-word;
      overflow-wrap:anywhere;
      white-space:pre-line;
      flex:0 0 auto;
    }

    .detail-body p{margin:0 0 10px}
    .detail-body p:last-child{margin-bottom:0}

    .detail-body table{
      width:100%;
      min-width:560px;
      border-collapse:collapse;
      background:#fff;
    }

    .detail-body th,.detail-body td{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:14px;
      word-break:break-word;
    }

    .detail-body th{
      background:#f8fafc;
      font-size:13px;
      font-weight:800;
      color:#374151;
    }

    .table-wrap{
      width:100%;
      overflow-x:auto;
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:16px;
      flex:0 0 auto;
    }

    .subnote{
      padding:14px 16px;
      border-radius:16px;
      background:#f8fbfd;
      border:1px solid var(--line);
      font-size:14px;
      color:#374151;
      white-space:pre-line;
      word-break:break-word;
      overflow-wrap:anywhere;
      flex:0 0 auto;
    }

    .warn{
      padding:14px 16px;
      border-radius:16px;
      background:var(--warn-bg);
      border:1px solid var(--warn-line);
      color:var(--warn-text);
      font-size:14px;
      white-space:pre-line;
      flex:0 0 auto;
    }

    .warn strong{
      display:block;
      margin-bottom:6px;
      font-size:13px;
    }

    .render-image{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
      flex:0 0 auto;
    }

    .render-image img{
      width:100%;
      max-height:260px;
      object-fit:contain;
      background:#fff;
    }

    .render-caption{
      padding:12px 14px;
      border-top:1px solid var(--line);
      font-size:13px;
      color:var(--muted);
      white-space:pre-line;
    }

    .screen-button{
      margin-top:auto;
      padding-top:8px;
      flex:0 0 auto;
    }

    .check-area{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      flex:0 0 auto;
    }

    .check-row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:14px 15px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fbfcfd;
      min-width:0;
    }

    .check-row input{
      width:18px;height:18px;
      margin-top:2px;
      accent-color:var(--brand);
      flex:0 0 auto;
    }

    .check-row span{
      font-size:14px;
      font-weight:700;
      word-break:break-word;
      white-space:pre-line;
    }

    .btn{
      border:none;
      padding:12px 16px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:all .18s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn.secondary{
      background:#fff;
      border:1px solid var(--line);
      color:#111827;
      box-shadow:0 6px 18px rgba(15,23,42,.05);
    }
    .btn.primary{
      background:var(--brand);
      color:#fff;
      box-shadow:0 10px 20px rgba(0,64,209,.18);
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
    }

    .pane-footer{
      flex:0 0 auto;
      border-top:1px solid #e9eef4;
      padding:14px 28px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
      background:linear-gradient(180deg,#ffffff 0%, #fbfcfd 100%);
    }

    .footer-left{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }

    .footer-page{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }

    .footer-btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .footer-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      flex:0 0 auto;
      align-content:start;
    }

    .field{display:flex;flex-direction:column;gap:6px}
    .field.full{grid-column:1 / -1}

    .field label{
      font-size:14px;
      font-weight:800;
      color:#1f2937;
      display:flex;
      align-items:center;
      gap:4px;
      white-space:normal;
    }

    .req{color:#dc2626}

    .input,.select,.textarea{
      width:100%;
      border:1px solid #dbe3ee;
      border-radius:14px;
      background:#fff;
      padding:11px 13px;
      outline:none;
      transition:border-color .18s ease, box-shadow .18s ease;
      color:#111827;
    }

    .input:focus,.select:focus,.textarea:focus{
      border-color:#b5c9ff;
      box-shadow:0 0 0 4px rgba(0,64,209,.08);
    }

    .textarea{
      min-height:110px;
      resize:vertical;
    }

    .hint{font-size:12px;color:#6b7280;white-space:pre-line}
    .choice-row{display:flex;gap:10px;flex-wrap:wrap}
    .choice-pill{
      border:1px solid #dbe3ee;
      background:#fff;
      border-radius:999px;
      padding:10px 14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      font-weight:700;
      color:#374151;
    }
    .choice-pill input{accent-color:var(--brand)}

    .pack-select-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
      align-items:stretch;
    }

    .pack-option{
      border:1px solid #dfe7f1;
      border-radius:18px;
      background:#fff;
      overflow:hidden;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      flex-direction:column;
      box-shadow:0 4px 14px rgba(15,23,42,.04);
      position:relative;
      min-height:0;
    }

    .pack-option:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(15,23,42,.06);
    }

    .pack-option.selected{
      border-color:var(--card-border);
      background:var(--card-selected);
      box-shadow:0 0 0 2px rgba(0,64,209,.08);
    }

    .pack-option input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .pack-thumb-wrap{
      position:relative;
      padding:12px 12px 0;
    }

    .pack-badge{
      position:absolute;
      top:18px;
      right:18px;
      width:22px;
      height:22px;
      border-radius:50%;
      border:2px solid #c6d2e2;
      background:#fff;
      z-index:2;
    }

    .pack-option.selected .pack-badge{
      border-color:var(--brand);
      background:var(--brand);
      box-shadow:inset 0 0 0 5px #fff;
    }

    .pack-thumb{
      width:100%;
      height:190px;
      border-radius:14px;
      overflow:hidden;
      background:#fff;
      border:1px solid #e5e7eb;
    }

    .pack-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .pack-title{
      margin:0;
      padding:12px 12px 14px;
      text-align:center;
      font-size:16px;
      font-weight:900;
      line-height:1.3;
      word-break:keep-all;
    }

    .pack-desc-panel{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      margin-top:2px;
    }

    .pack-desc-box{
      border:1px solid var(--line);
      background:var(--soft);
      border-radius:16px;
      padding:14px 16px;
    }

    .pack-desc-head{
      margin:0 0 6px;
      font-size:14px;
      font-weight:900;
      color:#0f172a;
    }

    .pack-desc-text{
      margin:0;
      font-size:14px;
      line-height:1.65;
      color:#475569;
      white-space:pre-line;
      word-break:keep-all;
    }

    .loading{padding:40px 20px;color:var(--muted);font-size:14px}
    .error{
      margin-top:10px;
      padding:14px 16px;
      border-radius:16px;
      background:var(--danger-bg);
      border:1px solid var(--danger-line);
      color:var(--danger-text);
      font-size:14px;
      white-space:pre-line;
    }
    .empty{color:var(--muted);font-size:14px}

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }

    .modal.open{display:flex}

    .modal-backdrop{
      position:absolute;
      inset:0;
      background:rgba(15,23,42,.48);
      backdrop-filter:blur(2px);
    }

    .modal-panel{
      position:relative;
      width:min(760px, 100%);
      max-height:85vh;
      overflow:auto;
      background:#fff;
      border-radius:26px;
      border:1px solid var(--line);
      box-shadow:0 24px 60px rgba(15,23,42,.20);
      padding:24px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
    }

    .modal-title{
      margin:0;
      font-size:24px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .modal-sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      white-space:pre-line;
    }

    .icon-btn{
      border:none;
      background:#f3f4f6;
      width:40px;height:40px;
      border-radius:12px;
      cursor:pointer;
      font-size:20px;
      line-height:1;
    }

    .faq-list{display:flex;flex-direction:column;gap:10px}
    .faq-item{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}
    .faq-q{
      width:100%;
      border:none;
      background:#fff;
      padding:16px;
      text-align:left;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      cursor:pointer;
      font-weight:800;
      font-size:15px;
    }

    .faq-a{
      display:none;
      padding:0 16px 16px;
      color:#374151;
      font-size:14px;
      white-space:pre-line;
      word-break:break-word;
    }

    .faq-item.open .faq-a{display:block}
    .faq-item.open .faq-arrow{transform:rotate(180deg)}
    .faq-arrow{transition:transform .2s ease;color:#6b7280}

    @media (max-width:768px){
      .app{padding:10px}
      .wizard-window{
        width:100%;
        height:calc(100vh - 20px);
      }
      .window-title{font-size:15px}
      .window-sub{display:none}
      .pane-top,.pane-content,.pane-footer{padding-left:18px;padding-right:18px}
      .pane-title{font-size:24px}
      .hero-text{font-size:18px}
      .form-grid,.check-area,.pack-select-grid{grid-template-columns:1fr}
      .pack-thumb{height:210px}
      .pane-footer{
        flex-direction:column;
        align-items:stretch;
      }
      .footer-right{justify-content:flex-end}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="wizard-window">
      <div class="window-titlebar">
        <div class="titlebar-left">
          <img src="./logo.png" class="top-logo" alt="회사 로고">
          <div class="window-title" id="windowTitleText">N배송 세팅 가이드</div>
        </div>
        <div class="window-sub" id="windowSubText">N배송 세팅 가이드</div>
      </div>

      <div class="window-body">
        <section class="right-pane">
          <div class="pane-top">
            <div class="progress-row">
              <div class="progress-left">
                <div class="step-chip" id="pageChip">STEP</div>
                <h1 class="pane-title" id="wizardTitle">불러오는 중...</h1>
                <p class="pane-desc" id="wizardDesc"></p>
              </div>
              <div class="progress-right" id="progressStat">진행 중</div>
            </div>

            <div class="progress-track">
              <div class="progress-fill" id="progressBarFill"></div>
            </div>
          </div>

          <div class="pane-content" id="paneContent">
            <div class="screen-card">
              <div class="loading">불러오는 중...</div>
            </div>
          </div>

          <div class="pane-footer">
            <div class="footer-left">
              <div class="footer-page" id="footerPageText">0 / 0 화면</div>
              <div class="footer-btns" id="footerBtnsLeft"></div>
            </div>

            <div class="footer-right" id="footerBtnsRight"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div class="modal" id="faqModal" aria-hidden="true">
    <div class="modal-backdrop" id="faqBackdrop"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="faqModalTitle">
      <div class="modal-head">
        <div>
          <h3 class="modal-title" id="faqModalTitle">도움말</h3>
          <p class="modal-sub" id="faqModalSub">현재 단계에서 자주 막히는 항목을 정리했습니다.</p>
        </div>
        <button class="icon-btn" id="faqCloseBtn" type="button" aria-label="닫기">×</button>
      </div>
      <div class="faq-list" id="faqList"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      SPREADSHEET_ID: '1JzTyCkZHBMEQiKNqIXLB8KUiVY8Y-33KICB2lwM06GQ',
      GAS_WEBAPP_URL: 'https://script.google.com/macros/s/AKfycbwwxe5ZigCmq-tjXyGZJUK1Nomije28Fu6Ueb-pw_d2KUsTsGHE5lcEeG505gfcVV-M/exec',
      SHEETS: {
        steps: 'steps',
        contents: 'contents',
        checklists: 'checklists',
        faqs: 'faqs',
        clients: '고객사링크'
      },
      PACK_OPTIONS: {
        '기본 포장': {
          title: '기본 포장',
          desc: '제품에 별도 완충 없이 박스 상·하단에 에어캡을 덮어 출고하는 방식입니다.',
          image: 'https://drive.google.com/thumbnail?id=1tITH7c-WsVejDK2F2JsECSvHMcpDnMJt&sz=w1200'
        },
        '에어캡 포장': {
          title: '에어캡 포장',
          desc: '제품을 에어캡으로 완충 포장 후 출고하는 방식입니다.\n추가 비용이 발생합니다.',
          image: 'https://drive.google.com/thumbnail?id=110e8PsWHq-2XkOYg7bXiONNn_1XpA-ip&sz=w1200'
        },
        '버블페이퍼 포장': {
          title: '버블페이퍼 포장',
          desc: '제품을 버블페이퍼로 완충 포장 후 출고하는 방식입니다.\n추가 비용이 발생합니다.',
          image: 'https://drive.google.com/thumbnail?id=1W2CYbdHLX7Uj2InTm-0HH-CaKnmAOomg&sz=w1200'
        }
      }
    };

    let DATA = [];
    let PAGES = [];
    let FAQ_ROWS = [];
    let CLIENT_INFO = null;
    let state = loadState();
    let currentGuidePageIndex = 0;
    let inquiryStep = 0;
    let inquirySubmitting = false;

    const params = new URLSearchParams(location.search);
    const clientCode = params.get('client') || '';

    const windowTitleText = document.getElementById('windowTitleText');
    const windowSubText = document.getElementById('windowSubText');

    const pageChip = document.getElementById('pageChip');
    const wizardTitle = document.getElementById('wizardTitle');
    const wizardDesc = document.getElementById('wizardDesc');
    const progressStat = document.getElementById('progressStat');
    const progressBarFill = document.getElementById('progressBarFill');
    const paneContent = document.getElementById('paneContent');
    const footerPageText = document.getElementById('footerPageText');
    const footerBtnsLeft = document.getElementById('footerBtnsLeft');
    const footerBtnsRight = document.getElementById('footerBtnsRight');

    const faqModal = document.getElementById('faqModal');
    const faqBackdrop = document.getElementById('faqBackdrop');
    const faqCloseBtn = document.getElementById('faqCloseBtn');
    const faqModalTitle = document.getElementById('faqModalTitle');
    const faqModalSub = document.getElementById('faqModalSub');
    const faqList = document.getElementById('faqList');

    google.charts.load('current');
    google.charts.setOnLoadCallback(init);

    async function init() {
      bindEvents();

      try {
        const [stepsRows, contentsRows, checklistRows, faqRows, clientRows] = await Promise.all([
          querySheet(CONFIG.SHEETS.steps),
          querySheet(CONFIG.SHEETS.contents),
          querySheet(CONFIG.SHEETS.checklists),
          querySheet(CONFIG.SHEETS.faqs),
          querySheet(CONFIG.SHEETS.clients)
        ]);

        if (!clientCode) throw new Error('고객사 코드가 없습니다. 링크에 ?client=고객사코드 형식이 필요합니다.');

        CLIENT_INFO = findClientInfo_(clientRows, clientCode);
        if (!CLIENT_INFO) throw new Error('유효하지 않은 고객사 링크입니다. 고객사코드를 확인해주세요.');
        if (String(CLIENT_INFO['사용여부'] || '').toUpperCase() === 'N') throw new Error('현재 비활성화된 고객사 링크입니다.');

        DATA = buildData(stepsRows, contentsRows, checklistRows, faqRows);
        FAQ_ROWS = faqRows || [];
        PAGES = buildPages(DATA);

        const customerName = String(CLIENT_INFO['고객사명'] || '').trim() || '고객사';
        document.title = `${customerName} | N배송 세팅 가이드`;
        windowTitleText.textContent = `${customerName} N배송 세팅 가이드`;
        windowSubText.textContent = 'N배송 세팅 가이드';

        currentGuidePageIndex = Math.min(state.currentGuidePageIndex ?? 0, Math.max(PAGES.length - 1, 0));
        renderRoot();
      } catch (err) {
        renderFatalError(err?.message || String(err));
      }
    }

    function bindEvents() {
      faqBackdrop.addEventListener('click', closeFaqModal);
      faqCloseBtn.addEventListener('click', closeFaqModal);

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && faqModal.classList.contains('open')) closeFaqModal();
      });
    }

    function renderRoot() {
      const submitted = String(CLIENT_INFO['사전문의제출여부'] || '').trim().toUpperCase() === 'Y';
      const guideOpened = String(CLIENT_INFO['가이드오픈여부'] || '').trim().toUpperCase() === 'Y';

      if (guideOpened) renderGuideWizard();
      else if (submitted) renderWaitingScreen();
      else renderInquiryWizard();
    }

    function querySheet(sheetName) {
      return new Promise((resolve, reject) => {
        const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SPREADSHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;
        const query = new google.visualization.Query(url);
        query.setQuery('select *');
        query.send(response => {
          if (response.isError()) {
            reject(new Error(response.getMessage() || `시트 조회 실패: ${sheetName}`));
            return;
          }

          const dt = response.getDataTable();
          const cols = [];
          for (let c = 0; c < dt.getNumberOfColumns(); c++) {
            cols.push(String(dt.getColumnLabel(c) || dt.getColumnId(c) || `col_${c}`).trim());
          }

          const rows = [];
          for (let r = 0; r < dt.getNumberOfRows(); r++) {
            const row = {};
            for (let c = 0; c < dt.getNumberOfColumns(); c++) {
              const raw = dt.getValue(r, c);
              const formatted = dt.getFormattedValue(r, c);
              row[cols[c]] = formatted ?? raw ?? '';
            }
            rows.push(row);
          }
          resolve(rows);
        });
      });
    }

    function buildData(stepsRows, contentsRows, checklistRows, faqRows) {
      const activeSteps = stepsRows
        .filter(r => String(r['사용여부'] || '').toUpperCase() !== 'N')
        .sort((a, b) => Number(a['단계순서'] || 0) - Number(b['단계순서'] || 0));

      return activeSteps.map((step, stepIdx) => {
        const stepId = String(step['단계ID'] || '').trim();

        const items = contentsRows
          .filter(r => String(r['단계ID'] || '').trim() === stepId)
          .sort((a, b) => Number(a['항목순서'] || 0) - Number(b['항목순서'] || 0))
          .map(r => ({
            title: r['항목명'] || '',
            type: String(r['항목타입'] || 'section').toLowerCase(),
            bodyHtml: r['본문HTML'] || '',
            noteHtml: r['안내HTML'] || '',
            warnHtml: r['주의HTML'] || '',
            imageUrl: r['이미지URL'] || '',
            imageCaption: r['이미지캡션'] || '',
            linkText: r['버튼텍스트'] || '',
            linkUrl: r['버튼링크'] || ''
          }));

        const checks = checklistRows
          .filter(r => String(r['단계ID'] || '').trim() === stepId)
          .sort((a, b) => Number(a['체크순서'] || 0) - Number(b['체크순서'] || 0))
          .map(r => r['체크문구'] || '');

        const faqs = faqRows
          .filter(r => String(r['단계ID'] || '').trim() === stepId)
          .sort((a, b) => Number(a['FAQ순서'] || 0) - Number(b['FAQ순서'] || 0))
          .map(r => ({
            q: r['질문'] || '',
            aHtml: r['답변HTML'] || ''
          }));

        return {
          id: stepId,
          order: Number(step['단계순서'] || stepIdx + 1),
          title: step['단계명'] || '',
          desc: step['단계설명'] || '',
          leadHtml: step['리드문구'] || '',
          items,
          checks,
          faqs
        };
      });
    }

    function buildPages(data) {
      const pages = [];
      data.forEach((step, stepIndex) => {
        step.items.forEach((item, itemIndex) => {
          pages.push({
            stepIndex,
            itemIndex,
            stepId: step.id,
            stepOrder: step.order,
            stepTitle: step.title,
            stepDesc: step.desc,
            stepLeadHtml: step.leadHtml,
            item
          });
        });
      });
      return pages;
    }

    function findClientInfo_(clientRows, code) {
      return clientRows.find(r => String(r['고객사코드'] || '').trim() === String(code || '').trim()) || null;
    }

    function storageKey() {
      return `poomgo_onboarding_${CONFIG.SPREADSHEET_ID}_${clientCode || 'default'}`;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey());
        return raw ? JSON.parse(raw) : { checks: {}, currentGuidePageIndex: 0, inquiryDraft: {} };
      } catch (_) {
        return { checks: {}, currentGuidePageIndex: 0, inquiryDraft: {} };
      }
    }

    function saveState() {
      localStorage.setItem(storageKey(), JSON.stringify({
        checks: state.checks || {},
        currentGuidePageIndex,
        inquiryDraft: collectInquiryDraft()
      }));
    }

    function getChecks(stepId) {
      if (!state.checks) state.checks = {};
      if (!state.checks[stepId]) state.checks[stepId] = [];
      return state.checks[stepId];
    }

    function isStepUnlocked(step, stepIndex) {
      if (stepIndex <= 1) return true;
      const header = `STEP${stepIndex + 1}오픈여부`;
      return String(CLIENT_INFO?.[header] || '').trim().toUpperCase() === 'Y';
    }

    function getPage(idx) {
      return PAGES[idx] || null;
    }

    function getCurrentStep() {
      const page = getPage(currentGuidePageIndex);
      if (!page) return null;
      return DATA[page.stepIndex] || null;
    }

    function getLastUnlockedGuidePageIndex() {
      let last = 0;
      for (let i = 0; i < PAGES.length; i++) {
        const page = PAGES[i];
        const step = DATA[page.stepIndex];
        if (isStepUnlocked(step, page.stepIndex)) last = i;
        else break;
      }
      return last;
    }

    function setShellTexts({badge, title, desc, stat, percent, footer, subText='N배송 세팅 가이드'}) {
      pageChip.textContent = badge || '';
      wizardTitle.textContent = title || '';
      wizardDesc.textContent = desc || '';
      progressStat.textContent = stat || '';
      progressBarFill.style.width = `${Math.max(0, Math.min(100, percent || 0))}%`;
      footerPageText.textContent = footer || '';
      windowSubText.textContent = subText;

      pageChip.classList.toggle('hidden', !badge);
      wizardTitle.classList.toggle('hidden', !title);
      wizardDesc.classList.toggle('hidden', !desc);
      footerPageText.classList.toggle('hidden', !footer);
    }

    function renderButtons(leftButtons, rightButtons) {
      footerBtnsLeft.innerHTML = '';
      footerBtnsRight.innerHTML = '';
      leftButtons.forEach(btn => footerBtnsLeft.appendChild(makeButton(btn)));
      rightButtons.forEach(btn => footerBtnsRight.appendChild(makeButton(btn)));
    }

    function makeButton({label, kind='secondary', onClick, disabled=false, href='', target='_blank'}) {
      if (href) {
        const a = document.createElement('a');
        a.className = `btn ${kind}`;
        a.href = href;
        a.target = target;
        a.rel = 'noopener noreferrer';
        a.textContent = label;
        return a;
      }
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `btn ${kind}`;
      button.textContent = label;
      button.disabled = !!disabled;
      if (onClick) button.addEventListener('click', onClick);
      return button;
    }

    function renderInquiryWizard() {
      const totalSteps = 3;
      windowTitleText.textContent = '원활한 운영을 위해 아래 양식을 모두 기입하여 제출해주세요.';

      const remain = Math.max(totalSteps - inquiryStep - 1, 0);
      setShellTexts({
        badge: '',
        title: '',
        desc: '',
        stat: remain === 0 ? '마지막 단계!' : `앞으로 ${remain}단계 남음`,
        percent: ((inquiryStep + 1) / totalSteps) * 100,
        footer: '',
        subText: 'N배송 세팅 가이드'
      });

      paneContent.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'screen-card';
      card.innerHTML =
        inquiryStep === 0 ? renderInquiryStep1()
        : inquiryStep === 1 ? renderInquiryStep2()
        : renderInquiryStep3();

      paneContent.appendChild(card);
      bindInquiryScreenEvents();
      restoreInquiryDraft();

      renderButtons(
        [
          {
            label: '이전',
            kind: 'secondary',
            disabled: inquiryStep === 0 || inquirySubmitting,
            onClick: () => {
              saveState();
              inquiryStep = Math.max(0, inquiryStep - 1);
              renderInquiryWizard();
            }
          },
          inquiryStep < 2 ? {
            label: '다음',
            kind: 'primary',
            disabled: inquirySubmitting,
            onClick: handleInquiryNext
          } : {
            label: inquirySubmitting ? '제출 중...' : '제출하기',
            kind: 'primary',
            disabled: inquirySubmitting,
            onClick: submitInquiryWizard
          }
        ],
        [
          {
            label: '도움말',
            kind: 'secondary',
            onClick: openInquiryHelp
          }
        ]
      );
    }

    function bindInquiryScreenEvents() {
      document.querySelectorAll('input[name="eventPlan"]').forEach(el => {
        el.addEventListener('change', () => {
          toggleEventFields();
          saveState();
        });
      });

      [
        'loginEmail','managerName','managerPhone','brandAddress','brandPhone',
        'inboundDate','eventName','eventDate','eventExpectedCount','inquiryText'
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', saveState);
          el.addEventListener('change', saveState);
        }
      });

      document.querySelectorAll('input[name="returnDest"], input[name="singleShipment"], input[name="eventPlan"]').forEach(el => {
        el.addEventListener('change', saveState);
      });

      document.querySelectorAll('[data-pack-option]').forEach(label => {
        label.addEventListener('click', () => {
          const value = label.getAttribute('data-pack-option') || '';
          setPackTypeSelection(value);
          saveState();
          updatePackDescription();
        });
      });

      updatePackSelectionUI();
      updatePackDescription();
    }

    function setPackTypeSelection(value) {
      document.querySelectorAll('input[name="packTypeCard"]').forEach(input => {
        input.checked = input.value === value;
      });
      state.inquiryDraft = { ...state.inquiryDraft, packType: value };
      updatePackSelectionUI();
    }

    function updatePackSelectionUI() {
      const selected = collectInquiryDraft().packType || '';
      document.querySelectorAll('[data-pack-option]').forEach(card => {
        card.classList.toggle('selected', card.getAttribute('data-pack-option') === selected);
      });
    }

    function updatePackDescription() {
      const selected = collectInquiryDraft().packType || '';
      const box = document.getElementById('packDescBox');
      if (!box) return;

      const info = CONFIG.PACK_OPTIONS[selected];
      box.innerHTML = info
        ? `
          <p class="pack-desc-head">${escapeHtml(info.title)}</p>
          <p class="pack-desc-text">${escapeHtml(info.desc)}</p>
        `
        : `
          <p class="pack-desc-head">포장 방법 설명</p>
          <p class="pack-desc-text">위 포장 방법 중 하나를 선택하면 설명이 표시됩니다.</p>
        `;
    }

    function toggleEventFields() {
      const value = document.querySelector('input[name="eventPlan"]:checked')?.value || '';
      const eventWrap = document.getElementById('eventFields');
      if (eventWrap) eventWrap.classList.toggle('hidden', value !== 'Y');
    }

    function collectInquiryDraft() {
      return {
        loginEmail: document.getElementById('loginEmail')?.value?.trim?.() || state.inquiryDraft?.loginEmail || '',
        managerName: document.getElementById('managerName')?.value?.trim?.() || state.inquiryDraft?.managerName || '',
        managerPhone: document.getElementById('managerPhone')?.value?.trim?.() || state.inquiryDraft?.managerPhone || '',
        brandAddress: document.getElementById('brandAddress')?.value?.trim?.() || state.inquiryDraft?.brandAddress || '',
        brandPhone: document.getElementById('brandPhone')?.value?.trim?.() || state.inquiryDraft?.brandPhone || '',
        returnDest: document.querySelector('input[name="returnDest"]:checked')?.value || state.inquiryDraft?.returnDest || '',
        packType: document.querySelector('input[name="packTypeCard"]:checked')?.value || state.inquiryDraft?.packType || '',
        singleShipment: document.querySelector('input[name="singleShipment"]:checked')?.value || state.inquiryDraft?.singleShipment || '',
        inboundDate: document.getElementById('inboundDate')?.value || state.inquiryDraft?.inboundDate || '',
        eventPlan: document.querySelector('input[name="eventPlan"]:checked')?.value || state.inquiryDraft?.eventPlan || '',
        eventName: document.getElementById('eventName')?.value?.trim?.() || state.inquiryDraft?.eventName || '',
        eventDate: document.getElementById('eventDate')?.value || state.inquiryDraft?.eventDate || '',
        eventExpectedCount: document.getElementById('eventExpectedCount')?.value || state.inquiryDraft?.eventExpectedCount || '',
        inquiryText: document.getElementById('inquiryText')?.value?.trim?.() || state.inquiryDraft?.inquiryText || ''
      };
    }

    function restoreInquiryDraft() {
      const draft = state.inquiryDraft || {};

      if (document.getElementById('loginEmail')) document.getElementById('loginEmail').value = draft.loginEmail || '';
      if (document.getElementById('managerName')) document.getElementById('managerName').value = draft.managerName || '';
      if (document.getElementById('managerPhone')) document.getElementById('managerPhone').value = draft.managerPhone || '';
      if (document.getElementById('brandAddress')) document.getElementById('brandAddress').value = draft.brandAddress || '';
      if (document.getElementById('brandPhone')) document.getElementById('brandPhone').value = draft.brandPhone || '';
      if (document.getElementById('inboundDate')) document.getElementById('inboundDate').value = draft.inboundDate || '';
      if (document.getElementById('eventName')) document.getElementById('eventName').value = draft.eventName || '';
      if (document.getElementById('eventDate')) document.getElementById('eventDate').value = draft.eventDate || '';
      if (document.getElementById('eventExpectedCount')) document.getElementById('eventExpectedCount').value = draft.eventExpectedCount || '';
      if (document.getElementById('inquiryText')) document.getElementById('inquiryText').value = draft.inquiryText || '';

      if (draft.returnDest) {
        const el = document.querySelector(`input[name="returnDest"][value="${CSS.escape(draft.returnDest)}"]`);
        if (el) el.checked = true;
      }
      if (draft.singleShipment) {
        const el = document.querySelector(`input[name="singleShipment"][value="${CSS.escape(draft.singleShipment)}"]`);
        if (el) el.checked = true;
      }
      if (draft.eventPlan) {
        const el = document.querySelector(`input[name="eventPlan"][value="${CSS.escape(draft.eventPlan)}"]`);
        if (el) el.checked = true;
      }
      if (draft.packType) {
        const el = document.querySelector(`input[name="packTypeCard"][value="${CSS.escape(draft.packType)}"]`);
        if (el) el.checked = true;
      }

      toggleEventFields();
      updatePackSelectionUI();
      updatePackDescription();
    }

    function showInquiryError(message) {
      const box = document.getElementById('inquiryStepError');
      if (!box) return;
      box.textContent = message;
      box.classList.remove('hidden');
    }

    function clearInquiryError() {
      const box = document.getElementById('inquiryStepError');
      if (!box) return;
      box.textContent = '';
      box.classList.add('hidden');
    }

    function validateInquiryStep(stepIndex) {
      const draft = collectInquiryDraft();

      if (stepIndex === 0) {
        if (!draft.loginEmail) return '로그인 이메일을 입력해주세요.';
        if (!draft.managerName) return '담당자명을 입력해주세요.';
        if (!draft.managerPhone) return '연락처를 입력해주세요.';
        if (!draft.brandAddress) return '브랜드 주소를 입력해주세요.';
        if (!draft.brandPhone) return '대표번호를 입력해주세요.';
        if (!draft.returnDest) return '반품 회수지를 선택해주세요.';
      }

      if (stepIndex === 1) {
        if (!draft.packType) return '포장 방법을 선택해주세요.';
      }

      if (stepIndex === 2) {
        if (!draft.singleShipment) return '단수 출고 여부를 선택해주세요.';
        if (!draft.inboundDate) return '초도 입고 예정일을 입력해주세요.';
        if (!draft.eventPlan) return '초도 입고 예정 월 행사 여부를 선택해주세요.';
        if (draft.eventPlan === 'Y') {
          if (!draft.eventName) return '행사명을 입력해주세요.';
          if (!draft.eventDate) return '행사 일자를 입력해주세요.';
          if (String(draft.eventExpectedCount || '') === '') return '예상 출고 송장 건 수를 입력해주세요.';
        }
      }

      return '';
    }

    function handleInquiryNext() {
      clearInquiryError();
      const error = validateInquiryStep(inquiryStep);
      if (error) {
        showInquiryError(error);
        return;
      }

      state.inquiryDraft = collectInquiryDraft();
      saveState();
      inquiryStep = Math.min(2, inquiryStep + 1);
      renderInquiryWizard();
    }

    async function submitInquiryWizard() {
      clearInquiryError();
      const error = validateInquiryStep(2);
      if (error) {
        showInquiryError(error);
        return;
      }

      inquirySubmitting = true;
      renderInquiryWizard();

      try {
        const draft = collectInquiryDraft();
        const payload = {
          action: 'submitInquiry',
          clientCode,
          loginEmail: draft.loginEmail,
          managerName: draft.managerName,
          managerPhone: draft.managerPhone,
          brandAddress: draft.brandAddress,
          brandPhone: draft.brandPhone,
          returnDest: draft.returnDest,
          inboundDate: draft.inboundDate,
          packType: draft.packType,
          singleShipment: draft.singleShipment,
          eventPlan: draft.eventPlan,
          eventName: draft.eventName,
          eventDate: draft.eventDate,
          eventExpectedCount: draft.eventExpectedCount,
          inquiryText: draft.inquiryText
        };

        const res = await fetch(CONFIG.GAS_WEBAPP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error('웹앱 응답을 읽지 못했습니다.');
        }

        if (!data.ok) throw new Error(data.message || '제출에 실패했습니다.');

        CLIENT_INFO['사전문의제출여부'] = 'Y';
        inquirySubmitting = false;
        renderWaitingScreen();
      } catch (e) {
        inquirySubmitting = false;
        renderInquiryWizard();
        showInquiryError(e.message || '제출 중 오류가 발생했습니다.');
      }
    }

    function renderWaitingScreen() {
      const customerName = String(CLIENT_INFO?.['고객사명'] || '').trim() || '고객사';
      windowTitleText.textContent = `${customerName} 사전 문의 접수 완료`;

      setShellTexts({
        badge: '접수 완료',
        title: '사전 문의가 접수되었습니다',
        desc: '품고에서 내용을 확인한 뒤 다음 단계를 오픈해드릴게요.',
        stat: '확인 중',
        percent: 100,
        footer: '대기 중',
        subText: 'N배송 세팅 가이드'
      });

      paneContent.innerHTML = `
        <div class="screen-card">
          <div class="hero-box">
            <div class="section-label">접수 완료</div>
            <p class="hero-text">제출된 내용을 품고에서 확인하고 있어요.</p>
          </div>

          <div class="screen-body" style="justify-content:center;">
            <div class="subnote" style="font-size:16px; line-height:1.8;">
              N배송 세팅 가이드가 오픈되기 전까지 조금만 기다려주세요🙏
            </div>
          </div>
        </div>
      `;

      renderButtons([], [
        {
          label: '도움말',
          kind: 'secondary',
          onClick: openWaitingHelp
        }
      ]);
    }

    function renderGuideWizard() {
      if (!PAGES.length) {
        renderFatalError('contents 시트에 표시할 화면이 없습니다.');
        return;
      }

      const maxPage = getLastUnlockedGuidePageIndex();
      if (currentGuidePageIndex > maxPage) currentGuidePageIndex = maxPage;

      const page = getPage(currentGuidePageIndex);
      const step = getCurrentStep();
      if (!page || !step) {
        renderFatalError('가이드 화면을 불러오지 못했습니다.');
        return;
      }

      const totalPages = PAGES.length;
      const totalSteps = DATA.length;
      const currentStepNo = page.stepIndex + 1;
      const remainingSteps = Math.max(totalSteps - currentStepNo, 0);
      const customerName = String(CLIENT_INFO?.['고객사명'] || '').trim() || '고객사';

      windowTitleText.textContent = `${customerName} · ${step.title}`;

      setShellTexts({
        badge: `STEP ${currentStepNo}`,
        title: step.title,
        desc: convertEscapedNewlines_(step.desc),
        stat: remainingSteps === 0 ? '마지막 단계!' : `앞으로 ${remainingSteps}단계 남음`,
        percent: ((currentGuidePageIndex + 1) / totalPages) * 100,
        footer: `${currentGuidePageIndex + 1} / ${totalPages} 화면`,
        subText: 'N배송 세팅 가이드'
      });

      paneContent.innerHTML = `
        <div class="screen-card">
          <div class="hero-box">
            <div class="section-label">이번 단계에서 할 일</div>
            <p class="hero-text">${convertEscapedNewlines_(step.leadHtml || '현재 화면 안내를 확인해주세요.')}</p>
          </div>

          <div class="screen-body">
            ${renderGuideScreen(page.item)}
            ${renderChecklist(step)}
          </div>
        </div>
      `;

      bindGuideScreenEvents();

      renderButtons(
        [
          {
            label: '이전',
            kind: 'secondary',
            disabled: currentGuidePageIndex === 0,
            onClick: () => {
              currentGuidePageIndex = Math.max(0, currentGuidePageIndex - 1);
              state.currentGuidePageIndex = currentGuidePageIndex;
              saveState();
              renderGuideWizard();
            }
          },
          {
            label: '다음',
            kind: 'primary',
            disabled: currentGuidePageIndex === maxPage,
            onClick: () => {
              currentGuidePageIndex = Math.min(maxPage, currentGuidePageIndex + 1);
              state.currentGuidePageIndex = currentGuidePageIndex;
              saveState();
              renderGuideWizard();
            }
          }
        ],
        [
          {
            label: '도움말',
            kind: 'secondary',
            onClick: openGuideHelp
          }
        ]
      );
    }

    function renderGuideScreen(item) {
      const title = `<h3 class="screen-title">${escapeHtml(item.title || '')}</h3>`;
      const body = item.bodyHtml ? `<div class="detail-body">${wrapTables(convertEscapedNewlines_(item.bodyHtml))}</div>` : '';
      const note = item.noteHtml ? `<div class="subnote">${convertEscapedNewlines_(item.noteHtml)}</div>` : '';
      const warn = item.warnHtml ? `<div class="warn"><strong>주의</strong>${convertEscapedNewlines_(item.warnHtml)}</div>` : '';
      const imageUrl = String(item.imageUrl || '').trim();
      const image = imageUrl
        ? `<div class="render-image">
             <img src="${escapeAttr(imageUrl)}" alt="${escapeAttr(item.title || '')}">
             ${item.imageCaption ? `<div class="render-caption">${escapeHtml(item.imageCaption).replaceAll('\\n','\n')}</div>` : ''}
           </div>`
        : '';
      const button = item.linkUrl
        ? `<div class="screen-button">
             <a class="btn primary" href="${escapeAttr(item.linkUrl)}" target="_blank" rel="noopener noreferrer">
               ${escapeHtml(item.linkText || '바로가기')}
             </a>
           </div>`
        : '';

      if (item.type === 'path') {
        return `
          ${title}
          <div class="subnote">${escapeHtml(stripHtml(item.bodyHtml || '')).replaceAll('>', '→').replaceAll('\\n', '\n')}</div>
          ${note}
          ${warn}
          ${image}
          ${button}
        `;
      }

      return `${title}${body}${image}${note}${warn}${button}`;
    }

    function renderChecklist(step) {
      const checks = getChecks(step.id);
      if (!step.checks.length) return '<div class="subnote">등록된 체크리스트가 없습니다.</div>';

      return `
        <div>
          <div class="section-label" style="margin-top:6px;">이 단계 체크리스트</div>
          <div class="check-area">
            ${step.checks.map((label, i) => `
              <label class="check-row">
                <input type="checkbox" data-check-index="${i}" ${checks[i] ? 'checked' : ''}>
                <span>${escapeHtml(label).replaceAll('\\n','\n')}</span>
              </label>
            `).join('')}
          </div>
        </div>
      `;
    }

    function bindGuideScreenEvents() {
      const step = getCurrentStep();
      if (!step) return;

      paneContent.querySelectorAll('[data-check-index]').forEach(input => {
        input.addEventListener('change', e => {
          const idx = Number(e.target.getAttribute('data-check-index') || 0);
          const checks = getChecks(step.id);
          checks[idx] = e.target.checked;
          saveState();
        });
      });
    }

    function getInquiryFaqs() {
      const stepKey = `inquiry${inquiryStep + 1}`;
      const currentStepFaqs = FAQ_ROWS
        .filter(r => String(r['단계ID'] || '').trim().toLowerCase() === stepKey)
        .sort((a, b) => Number(a['FAQ순서'] || 0) - Number(b['FAQ순서'] || 0));

      const commonFaqs = FAQ_ROWS
        .filter(r => String(r['단계ID'] || '').trim().toLowerCase() === 'inquiry')
        .sort((a, b) => Number(a['FAQ순서'] || 0) - Number(b['FAQ순서'] || 0));

      return [...currentStepFaqs, ...commonFaqs].map(r => ({
        q: r['질문'] || '',
        aHtml: r['답변HTML'] || ''
      }));
    }

    function convertEscapedNewlines_(text) {
      return String(text || '').replace(/\\n/g, '\n');
    }

    function wrapTables(html) {
      const temp = document.createElement('div');
      temp.innerHTML = html || '';
      temp.querySelectorAll('table').forEach(table => {
        const wrapper = document.createElement('div');
        wrapper.className = 'table-wrap';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      });
      return temp.innerHTML;
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return div.textContent || div.innerText || '';
    }

    function openInquiryHelp() {
      const faqs = getInquiryFaqs();
      faqModalTitle.textContent = '사전 문의 도움말';
      faqModalSub.textContent = '사전 문의 단계에서 자주 확인하는 항목입니다.';
      faqList.innerHTML = '';

      if (!faqs.length) {
        faqList.innerHTML = '<div class="subnote">등록된 FAQ가 없습니다.</div>';
      } else {
        faqs.forEach((faq, idx) => {
          const item = document.createElement('div');
          item.className = 'faq-item' + (idx === 0 ? ' open' : '');
          item.innerHTML = `
            <button class="faq-q" type="button">
              <span>${escapeHtml(faq.q)}</span>
              <span class="faq-arrow">⌄</span>
            </button>
            <div class="faq-a">${convertEscapedNewlines_(faq.aHtml)}</div>
          `;
          faqList.appendChild(item);
        });
      }

      bindFaqToggle();
      faqModal.classList.add('open');
    }

    function openWaitingHelp() {
      faqModalTitle.textContent = '접수 후 안내';
      faqModalSub.textContent = '오픈 전까지의 흐름을 안내드립니다.';
      faqList.innerHTML = `
        <div class="faq-item open">
          <button class="faq-q" type="button"><span>가이드는 언제 오픈되나요?</span><span class="faq-arrow">⌄</span></button>
          <div class="faq-a">품고에서 사전 문의 내용을 확인한 뒤 순차적으로 오픈해드리며, 오픈이 완료되면 메일로 안내드립니다.</div>
        </div>
      `;
      bindFaqToggle();
      faqModal.classList.add('open');
    }

    function openGuideHelp() {
      const step = getCurrentStep();
      if (!step) return;

      faqModalTitle.textContent = `${step.title} 도움말`;
      faqModalSub.textContent = '현재 단계에서 자주 막히는 항목을 정리했습니다.';
      faqList.innerHTML = '';

      if (!step.faqs.length) {
        faqList.innerHTML = '<div class="subnote">등록된 FAQ가 없습니다.</div>';
      } else {
        step.faqs.forEach((faq, idx) => {
          const item = document.createElement('div');
          item.className = 'faq-item' + (idx === 0 ? ' open' : '');
          item.innerHTML = `
            <button class="faq-q" type="button">
              <span>${escapeHtml(faq.q)}</span>
              <span class="faq-arrow">⌄</span>
            </button>
            <div class="faq-a">${convertEscapedNewlines_(faq.aHtml)}</div>
          `;
          faqList.appendChild(item);
        });
      }

      bindFaqToggle();
      faqModal.classList.add('open');
    }

    function bindFaqToggle() {
      faqList.querySelectorAll('.faq-q').forEach(btn => {
        btn.addEventListener('click', () => {
          btn.closest('.faq-item')?.classList.toggle('open');
        });
      });
    }

    function closeFaqModal() {
      faqModal.classList.remove('open');
    }

    function renderFatalError(message) {
      setShellTexts({
        badge: '오류',
        title: '불러오기 실패',
        desc: '',
        stat: '확인 필요',
        percent: 0,
        footer: '',
        subText: 'N배송 세팅 가이드'
      });

      paneContent.innerHTML = `
        <div class="screen-card">
          <div class="error">${escapeHtml(message)}</div>
        </div>
      `;
      renderButtons([], []);
    }

    function escapeHtml(str='') {
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    function escapeAttr(str='') {
      return escapeHtml(str);
    }
  </script>
</body>
</html>
