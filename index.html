<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>품고 셀프 온보딩</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#03C75A;
      --primary-soft:#ecfdf3;
      --primary-deep:#02b350;
      --soft:#f8fafc;
      --warn-bg:#fff7ed;
      --warn-line:#fed7aa;
      --warn-text:#9a3412;
      --shadow:0 10px 30px rgba(15,23,42,.06);
      --radius-xl:22px;
      --radius-lg:16px;
      --radius-md:12px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:"Pretendard Variable","Pretendard",system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    button,input{font:inherit}
    img{max-width:100%;display:block}

    .app{
      width:100%;
      min-height:100vh;
      padding:16px;
    }

    .topbar{
      margin-bottom:16px;
      padding:0 4px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary-deep);
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    h1{
      margin:0 0 6px;
      font-size:30px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .layout{
      display:grid;
      grid-template-columns:300px minmax(0,1fr);
      gap:16px;
      min-height:calc(100vh - 110px);
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
    }

    .sidebar{
      padding:16px;
      position:sticky;
      top:16px;
      height:fit-content;
    }

    .side-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:14px;
    }

    .side-title{
      font-size:17px;
      font-weight:800;
    }

    .progress{
      padding:6px 10px;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary-deep);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .accordion{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .step-item{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .step-header{
      width:100%;
      border:none;
      background:#fff;
      padding:14px;
      display:flex;
      align-items:center;
      gap:12px;
      text-align:left;
      cursor:pointer;
    }

    .step-item.active .step-header{
      background:linear-gradient(180deg,#fbfffd 0%, #f3fff8 100%);
    }

    .step-num{
      width:34px;
      height:34px;
      border-radius:11px;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:800;
      background:#f3f4f6;
      flex:0 0 34px;
    }

    .step-item.active .step-num{
      background:var(--primary);
      color:#fff;
    }

    .step-main{
      min-width:0;
      flex:1;
    }

    .step-title{
      margin:0 0 4px;
      font-size:14px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .step-state{
      display:flex;
      align-items:center;
      gap:7px;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#d1d5db;
    }

    .dot.done{background:var(--primary)}
    .dot.current{background:#2563eb}

    .chev{
      color:#6b7280;
      transition:transform .2s ease;
      font-size:18px;
    }

    .step-item.active .chev{transform:rotate(180deg)}

    .step-body{
      display:none;
      padding:10px 14px 14px;
      border-top:1px solid var(--line);
      background:#fcfcfd;
    }

    .step-item.active .step-body{display:block}

    .step-sublist{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .step-subitem{
      display:flex;
      gap:8px;
      font-size:13px;
      color:#374151;
      word-break:break-word;
    }

    .side-note{
      margin-top:14px;
      padding:12px 13px;
      border-radius:14px;
      background:#f9fafb;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
    }

    .main{
      padding:24px 28px;
      min-width:0;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .step-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#f3f4f6;
      color:#374151;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .hero h2{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.2;
      letter-spacing:-.03em;
      word-break:keep-all;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      word-break:keep-all;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      padding:12px 15px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
    }

    .btn.secondary{
      background:#fff;
      border:1px solid var(--line);
      color:#111827;
    }

    .btn.primary{
      background:var(--primary);
      color:#fff;
    }

    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .guide{
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
      background:#fff;
    }

    .guide-section{
      padding:24px;
    }

    .guide-section + .guide-section{
      border-top:1px solid var(--line);
    }

    .section-label{
      margin:0 0 12px;
      font-size:13px;
      font-weight:900;
      color:#6b7280;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .lead-box{
      background:linear-gradient(180deg,#fbfffd 0%, #f3fff8 100%);
    }

    .lead-text{
      margin:0;
      font-size:20px;
      line-height:1.5;
      font-weight:800;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .flow-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .flow-list li{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:14px 0;
      border-bottom:1px solid #eef2f7;
      min-width:0;
    }

    .flow-list li:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .flow-num{
      width:28px;
      height:28px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#111827;
      color:#fff;
      font-size:12px;
      font-weight:800;
      flex:0 0 28px;
      margin-top:1px;
    }

    .flow-text{
      font-size:15px;
      font-weight:700;
      word-break:break-word;
    }

    .detail-list{
      display:flex;
      flex-direction:column;
      gap:0;
    }

    .detail-item{
      padding:18px 0;
      border-bottom:1px solid #eef2f7;
    }

    .detail-item:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .detail-title{
      margin:0 0 8px;
      font-size:17px;
      font-weight:800;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .detail-body{
      margin:0;
      font-size:15px;
      color:#374151;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .subnote{
      margin-top:10px;
      padding:14px;
      border-radius:14px;
      background:var(--soft);
      border:1px solid var(--line);
      font-size:14px;
      color:#374151;
      white-space:pre-line;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .warn{
      margin-top:10px;
      padding:14px;
      border-radius:14px;
      background:var(--warn-bg);
      border:1px solid var(--warn-line);
      color:var(--warn-text);
      font-size:14px;
    }

    .warn strong{
      display:block;
      margin-bottom:6px;
      font-size:13px;
    }

    .placeholder{
      margin-top:10px;
      min-height:200px;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:#fafcff;
      color:#64748b;
      font-size:14px;
      font-weight:700;
      padding:20px;
    }

    .table-wrap{
      width:100%;
      overflow-x:auto;
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:14px;
    }

    table{
      width:100%;
      min-width:560px;
      border-collapse:collapse;
      background:#fff;
    }

    th,td{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:14px;
      word-break:break-word;
    }

    th{
      background:#f9fafb;
      font-size:13px;
      font-weight:800;
      color:#374151;
    }

    .check-area{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .check-row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fafafa;
      min-width:0;
    }

    .check-row input{
      width:18px;
      height:18px;
      margin-top:2px;
      accent-color:var(--primary);
      flex:0 0 auto;
    }

    .check-row span{
      font-size:14px;
      font-weight:700;
      word-break:break-word;
    }

    .footer-nav{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    /* FAQ modal */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }

    .modal.open{
      display:flex;
    }

    .modal-backdrop{
      position:absolute;
      inset:0;
      background:rgba(15,23,42,.48);
    }

    .modal-panel{
      position:relative;
      width:min(760px, 100%);
      max-height:85vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      border:1px solid var(--line);
      box-shadow:0 24px 60px rgba(15,23,42,.24);
      padding:24px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
    }

    .modal-title{
      margin:0;
      font-size:24px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .modal-sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .icon-btn{
      border:none;
      background:#f3f4f6;
      width:40px;
      height:40px;
      border-radius:12px;
      cursor:pointer;
      font-size:20px;
      line-height:1;
    }

    .faq-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .faq-item{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .faq-q{
      width:100%;
      border:none;
      background:#fff;
      padding:16px;
      text-align:left;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      cursor:pointer;
      font-weight:800;
      font-size:15px;
    }

    .faq-q:hover{
      background:#fafafa;
    }

    .faq-a{
      display:none;
      padding:0 16px 16px;
      color:#374151;
      font-size:14px;
      white-space:pre-line;
      word-break:break-word;
    }

    .faq-item.open .faq-a{
      display:block;
    }

    .faq-item.open .faq-arrow{
      transform:rotate(180deg);
    }

    .faq-arrow{
      transition:transform .2s ease;
      color:#6b7280;
      flex:0 0 auto;
    }

    @media (max-width:1024px){
      .layout{
        grid-template-columns:1fr;
      }
      .sidebar{
        position:static;
      }
      .check-area{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .app{padding:10px}
      .main{padding:18px}
      h1{font-size:24px}
      .hero h2{font-size:23px}
      .guide-section{padding:18px}
      .modal-panel{padding:18px}
      .modal-title{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="badge">셀프 세팅 가이드</div>
      <h1>품고 셀프 온보딩</h1>
      <p class="sub">질문 없이 순서대로 따라가면 세팅이 완료되도록 구성한 셀프 온보딩입니다.</p>
    </div>

    <div class="layout">
      <aside class="card sidebar">
        <div class="side-head">
          <div class="side-title">진행 단계</div>
          <div class="progress" id="progressText">0 / 5 완료</div>
        </div>

        <div class="accordion" id="stepAccordion"></div>

        <div class="side-note">
          완료 항목을 모두 체크하면 해당 STEP은 완료 처리되며 자동으로 닫히고 다음 STEP이 열립니다.
        </div>
      </aside>

      <main class="card main">
        <div class="hero">
          <div>
            <div class="step-chip" id="heroChip">STEP 1</div>
            <h2 id="heroTitle">고객사 등록</h2>
            <p id="heroDesc"></p>
          </div>

          <div class="actions">
            <button class="btn secondary" id="faqBtn" type="button">FAQ 보기</button>
            <button class="btn secondary" id="resetBtn" type="button">체크 초기화</button>
          </div>
        </div>

        <section class="guide">
          <div class="guide-section lead-box">
            <div class="section-label">지금 해야 할 일</div>
            <p class="lead-text" id="leadText"></p>
          </div>

          <div class="guide-section">
            <div class="section-label">진행 순서</div>
            <ul class="flow-list" id="flowList"></ul>
          </div>

          <div class="guide-section">
            <div class="section-label">상세 안내</div>
            <div class="detail-list" id="detailList"></div>
          </div>

          <div class="guide-section">
            <div class="section-label">완료 체크</div>
            <div class="check-area" id="checkArea"></div>
          </div>
        </section>

        <div class="footer-nav">
          <button class="btn secondary" id="prevBtn" type="button">이전 단계</button>
          <button class="btn primary" id="nextBtn" type="button">다음 단계</button>
        </div>
      </main>
    </div>
  </div>

  <div class="modal" id="faqModal" aria-hidden="true">
    <div class="modal-backdrop" id="faqBackdrop"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="faqModalTitle">
      <div class="modal-head">
        <div>
          <h3 class="modal-title" id="faqModalTitle">FAQ</h3>
          <p class="modal-sub" id="faqModalSub">현재 단계에서 자주 막히는 항목을 정리했습니다.</p>
        </div>
        <button class="icon-btn" id="faqCloseBtn" type="button" aria-label="닫기">×</button>
      </div>

      <div class="faq-list" id="faqList"></div>
    </div>
  </div>

  <script>
    const DATA = [
      {
        id: "client_register",
        title: "고객사 등록",
        desc: "고객사 등록, 로그인, 구성원 추가를 진행합니다.",
        lead: "고객사 등록 메일을 확인하고 고객사 정보 입력 → 품고 나우 로그인 → 구성원 추가까지 완료해주세요.",
        items: [
          {
            title: "고객사 등록 메일 수신",
            type: "section",
            body: "품고에서 발송된 고객사 등록 메일을 확인한 후 메일 내 [고객사 등록하기] 버튼을 클릭하여 등록을 진행해주세요.",
            warn: ["메일 수신 후 24시간 이내 등록이 필요합니다."]
          },
          {
            title: "고객사 정보 입력",
            type: "section",
            body: "브랜드 및 사업자 정보를 입력해주세요.",
            note: "고객사명은 브랜드명과 동일하게 입력해주세요.\n사업자 정보는 네이버 기준으로 입력해주세요."
          },
          {
            title: "품고 나우 로그인 하기",
            type: "section",
            body: "고객사 등록 완료 후 품고 나우 로그인을 진행해주세요."
          },
          {
            title: "구성원 추가",
            type: "path",
            body: "품고 나우 > 등록 > + 구성원 추가 클릭 > 이름, 이메일, 전화번호 입력 > 구성원 추가 클릭"
          }
        ],
        checks: [
          "고객사 등록 메일 확인 완료",
          "고객사 정보 입력 완료",
          "품고 나우 로그인 완료",
          "구성원 추가 완료"
        ],
        faqs: [
          {
            q: "고객사 등록 버튼이 보이지 않아요.",
            a: "메일 수신 후 24시간이 경과했거나 링크가 만료된 경우 버튼이 보이지 않을 수 있습니다.\n이 경우 사업자 주소, 브랜드 고객센터 대표번호, 반품지 주소, 담당자명/연락처/이메일 정보를 준비해 별도 전달 후 진행해주세요."
          },
          {
            q: "메일 수신 후 24시간이 지났어요.",
            a: "등록 링크 사용이 어려울 수 있습니다.\n별도 재등록 또는 수기 확인이 필요할 수 있으므로 지정된 제출 정보 기준으로 전달 후 진행해주세요."
          },
          {
            q: "구성원 추가는 꼭 해야 하나요?",
            a: "실제 운영에 참여하는 계정이 2인 이상이거나 담당자가 분리되어 있다면 미리 등록하는 것이 좋습니다.\n초기 운영 중 계정 혼선 방지에 도움이 됩니다."
          }
        ]
      },
      {
        id: "fulfillment",
        title: "풀필먼트 연동",
        desc: "판매처 등록, 풀필먼트 신청, 연동 확인을 진행합니다.",
        lead: "판매처 등록 후 풀필먼트 신청 → 연동 확인 → N배송 동의까지 진행해주세요.",
        items: [
          {
            title: "판매처 등록",
            type: "section",
            body: "스마트스토어 등 판매처 계정을 등록해주세요."
          },
          {
            title: "풀필먼트 신청",
            type: "section",

      },
      {

        ],
        checks: [

        ],
        faqs: [
          {

          },
          {
            q: "SKU명은 어디까지 자세히 적어야 하나요?",
            a: "최소한 옵션/호수/색상 등 서로 구분되는 정보가 포함되어야 합니다.\n예: 체리 ❌ / 꽃물 틴트 1호 체리 ✅"
          },
          {

            a: "사은품으로 선택하면 품고 전산에 SKU가 정상 등록되지 않기 때문입니다.\n등록 대상은 상품으로 선택해주세요."

      },

            warn: ["기준 미준수 시 입고 지연 또는 추가 작업 비용이 발생할 수 있습니다."]
          },
          {

          }
        ],
        checks: [

        ],
        faqs: [

          },
          {
            q: "포장 방식은 왜 꼭 맞춰야 하나요?",
            a: "입고 검수, 보관, 출고 과정의 작업 효율과 안전성에 직접 영향을 주기 때문입니다.\n특히 파손 우려 상품은 포장 방식 확인이 중요합니다."
          }
        ]
      },
      {
        id: "ndelivery",
        title: "N배송 설정",
        desc: "연결 상품 및 재고 점검 후 N배송 설정을 진행합니다.",
        lead: "연결 상품과 재고를 점검한 뒤 N배송 설정을 완료해주세요.",
        items: [
          {
            title: "연결 상품 점검",
            type: "section",
            body: "SKU와 판매처 상품 연결 상태를 확인해주세요.",
            warn: ["연결되지 않은 상품은 출고되지 않습니다."]
          },
          {
            title: "재고 점검",
            type: "section",
            body: "입고 재고가 정상 반영되었는지 확인해주세요."
          },
          {
            title: "N배송 설정하기",
            type: "section",
            body: "N배송 출고 설정을 진행해주세요."
          }
        ],
        checks: [
          "연결 상품 점검 완료",
          "재고 점검 완료",
          "N배송 설정 완료"
        ],
        faqs: [
          {
            q: "연결 상품이 누락되면 어떻게 되나요?",
            a: "연결되지 않은 상품은 정상 출고 대상이 되지 않습니다.\n설정 전 연결 상태를 먼저 점검해주세요."
          },
          {
            q: "재고가 반영되기 전에 N배송 설정을 해도 되나요?",
            a: "권장하지 않습니다.\n재고 반영 상태를 먼저 확인한 뒤 설정하는 것이 안전합니다."
          }
        ]
      }
    ];

    const STORAGE_KEY = "poomgo_self_onboarding_v4";
    const state = loadState();

    let currentIndex = state.currentIndex ?? 0;
    let openStepId = state.openStepId ?? DATA[0].id;

    const stepAccordion = document.getElementById("stepAccordion");
    const progressText = document.getElementById("progressText");
    const heroChip = document.getElementById("heroChip");
    const heroTitle = document.getElementById("heroTitle");
    const heroDesc = document.getElementById("heroDesc");
    const leadText = document.getElementById("leadText");
    const flowList = document.getElementById("flowList");
    const detailList = document.getElementById("detailList");
    const checkArea = document.getElementById("checkArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    const faqBtn = document.getElementById("faqBtn");
    const faqModal = document.getElementById("faqModal");
    const faqBackdrop = document.getElementById("faqBackdrop");
    const faqCloseBtn = document.getElementById("faqCloseBtn");
    const faqModalTitle = document.getElementById("faqModalTitle");
    const faqModalSub = document.getElementById("faqModalSub");
    const faqList = document.getElementById("faqList");

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { checks: {}, currentIndex: 0, openStepId: DATA[0].id };
      } catch (e) {
        return { checks: {}, currentIndex: 0, openStepId: DATA[0].id };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        checks: state.checks || {},
        currentIndex,
        openStepId
      }));
    }

    function getChecks(stepId) {
      if (!state.checks) state.checks = {};
      if (!state.checks[stepId]) state.checks[stepId] = [];
      return state.checks[stepId];
    }

    function isStepDone(step) {
      const arr = getChecks(step.id);
      return step.checks.length > 0 && step.checks.every((_, i) => !!arr[i]);
    }

    function statusOf(step, idx) {
      if (isStepDone(step)) return { text: "완료", cls: "done" };
      if (idx === currentIndex) return { text: "진행중", cls: "current" };
      return { text: "대기", cls: "" };
    }

    function renderAccordion() {
      stepAccordion.innerHTML = "";
      const doneCount = DATA.filter(isStepDone).length;
      progressText.textContent = `${doneCount} / ${DATA.length} 완료`;

      DATA.forEach((step, idx) => {
        const s = statusOf(step, idx);
        const item = document.createElement("div");
        item.className = "step-item" + (openStepId === step.id ? " active" : "");

        item.innerHTML = `
          <button class="step-header" type="button">
            <div class="step-num">${idx + 1}</div>
            <div class="step-main">
              <div class="step-title">${escapeHtml(step.title)}</div>
              <div class="step-state">
                <span class="dot ${s.cls}"></span>
                <span>${s.text}</span>
              </div>
            </div>
            <div class="chev">⌄</div>
          </button>
          <div class="step-body">
            <div class="step-sublist">
              ${step.items.map(x => `<div class="step-subitem"><span>ㄴ</span><span>${escapeHtml(x.title)}</span></div>`).join("")}
            </div>
          </div>
        `;

        item.querySelector(".step-header").addEventListener("click", () => {
          currentIndex = idx;
          openStepId = openStepId === step.id ? "" : step.id;
          saveState();
          render();
        });

        stepAccordion.appendChild(item);
      });
    }

    function renderMain() {
      const step = DATA[currentIndex];
      heroChip.textContent = `STEP ${currentIndex + 1}`;
      heroTitle.textContent = step.title;
      heroDesc.textContent = step.desc;
      leadText.textContent = step.lead;

      flowList.innerHTML = "";
      step.items.forEach((item, idx) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <div class="flow-num">${idx + 1}</div>
          <div class="flow-text">${escapeHtml(item.title)}</div>
        `;
        flowList.appendChild(li);
      });

      detailList.innerHTML = "";
      step.items.forEach(item => {
        const div = document.createElement("div");
        div.className = "detail-item";
        div.innerHTML = renderDetail(item);
        detailList.appendChild(div);
      });

      checkArea.innerHTML = "";
      const checks = getChecks(step.id);

      step.checks.forEach((label, i) => {
        const row = document.createElement("label");
        row.className = "check-row";
        row.innerHTML = `
          <input type="checkbox" ${checks[i] ? "checked" : ""}>
          <span>${escapeHtml(label)}</span>
        `;

        row.querySelector("input").addEventListener("change", (e) => {
          checks[i] = e.target.checked;

          if (isStepDone(step)) {
            openStepId = "";
            if (currentIndex < DATA.length - 1) {
              currentIndex += 1;
              openStepId = DATA[currentIndex].id;
            }
          } else {
            openStepId = step.id;
          }

          saveState();
          render();
        });

        checkArea.appendChild(row);
      });
    }

    function renderDetail(item) {
      if (item.type === "path") {
        return `
          <h3 class="detail-title">${escapeHtml(item.title)}</h3>
          <p class="detail-body">아래 경로대로 진행해주세요.</p>
          <div class="subnote">${escapeHtml(item.body).replaceAll(" > ", "\n→ ")}</div>
        `;
      }

      if (item.type === "placeholder") {
        return `
          <h3 class="detail-title">${escapeHtml(item.title)}</h3>
          <div class="placeholder">${escapeHtml(item.body)}</div>
        `;
      }

      if (item.type === "custom" && item.body === "skuGuide") {
        return `
          <h3 class="detail-title">SKU 등록</h3>
          <p class="detail-body">SKU 등록 화면에서 필수 항목을 기준에 맞게 입력해주세요.</p>
          <div class="placeholder">여기에 SKU 등록 화면 이미지를 넣어주세요. 추천: ① SKU명 ② 바코드 ③ 보관온도 ④ 소비기한 ⑤ 로트번호 ⑥ 보관사이즈 ⑦ SKU유형 번호 표시</div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>항목</th><th>입력 기준</th></tr>
              </thead>
              <tbody>
                <tr><td>SKU명</td><td>모두가 식별 가능한 형태로 입력</td></tr>
                <tr><td>바코드</td><td>실물 바코드와 동일하게 입력</td></tr>
                <tr><td>보관 온도</td><td>상온</td></tr>
                <tr><td>소비기한 관리여부</td><td>소비기한을 관리하는 품목인 경우에만 관리 선택</td></tr>
                <tr><td>로트번호 관리여부</td><td>제조 로트를 관리하는 품목인 경우에만 관리 선택</td></tr>
                <tr><td>보관사이즈</td><td>모두 1 입력</td></tr>
                <tr><td>SKU 유형</td><td>상품 선택</td></tr>
              </tbody>
            </table>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>기준</th><th>상품명</th></tr>
              </thead>
              <tbody>
                <tr><td>식별 가능</td><td>꽃물 틴트 1호 체리, 꽃물 틴트 2호 딸기</td></tr>
                <tr><td>식별 불가</td><td>체리, 딸기</td></tr>
              </tbody>
            </table>
          </div>

          <div class="warn">
            <strong>주의</strong>
            관리하지 않는 상품을 관리함으로 설정하지 않도록 주의해주세요. 수정이 불가합니다.<br>
            사은품 선택 시 품고 전산에 등록되지 않으므로 상품으로 선택해주세요.<br>
            최초 입고 SKU는 품고에서 체적 정보를 측정하여 자동 반영됩니다.
          </div>
        `;
      }

      return `
        <h3 class="detail-title">${escapeHtml(item.title)}</h3>
        <p class="detail-body">${escapeHtml(item.body)}</p>
        ${item.note ? `<div class="subnote">${escapeHtml(item.note)}</div>` : ""}
        ${item.warn?.length ? `<div class="warn"><strong>주의</strong>${item.warn.map(x => escapeHtml(x)).join("<br>")}</div>` : ""}
      `;
    }

    function openFaqModal() {
      const step = DATA[currentIndex];
      faqModalTitle.textContent = `${step.title} FAQ`;
      faqModalSub.textContent = "현재 단계에서 자주 막히는 항목을 정리했습니다.";
      faqList.innerHTML = "";

      (step.faqs || []).forEach((faq, idx) => {
        const item = document.createElement("div");
        item.className = "faq-item" + (idx === 0 ? " open" : "");
        item.innerHTML = `
          <button class="faq-q" type="button">
            <span>${escapeHtml(faq.q)}</span>
            <span class="faq-arrow">⌄</span>
          </button>
          <div class="faq-a">${escapeHtml(faq.a)}</div>
        `;

        item.querySelector(".faq-q").addEventListener("click", () => {
          item.classList.toggle("open");
        });

        faqList.appendChild(item);
      });

      faqModal.classList.add("open");
      faqModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeFaqModal() {
      faqModal.classList.remove("open");
      faqModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function render() {
      renderAccordion();
      renderMain();
    }

    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex -= 1;
        openStepId = DATA[currentIndex].id;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentIndex < DATA.length - 1) {
        currentIndex += 1;
        openStepId = DATA[currentIndex].id;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    resetBtn.addEventListener("click", () => {
      if (!confirm("체크한 완료 항목을 모두 초기화할까요?")) return;
      localStorage.removeItem(STORAGE_KEY);
      state.checks = {};
      currentIndex = 0;
      openStepId = DATA[0].id;
      saveState();
      render();
    });

    faqBtn.addEventListener("click", openFaqModal);
    faqCloseBtn.addEventListener("click", closeFaqModal);
    faqBackdrop.addEventListener("click", closeFaqModal);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && faqModal.classList.contains("open")) {
        closeFaqModal();
      }
    });

    render();
  </script>
